<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Events and Timers Sandbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <section class="card">
            <h2>Task 1: Keyboard Events (keydown)</h2>
            <div class="form-group">
                <input type="text" id="chat-input" placeholder="Type a message and press Enter...">
            </div>
            <ul id="chat-messages"></ul>
        </section>

        <section class="card">
            <h2>Task 2: Timers (setTimeout & setInterval)</h2>
            
            <div class="sub-section">
                <button id="alert-btn">Trigger 3s Alert</button>
                <div id="alert-msg">This message will self-destruct in 3 seconds!</div>
            </div>

            <div class="sub-section">
                <div class="counter-box">
                    Count: <span id="counter-display">0</span>
                </div>
                <div class="btn-group">
                    <button id="start-btn">Start Counter</button>
                    <button id="stop-btn" class="btn-danger">Stop Counter</button>
                </div>
            </div>
        </section>

        <section class="card">
            <h2>Task 3: Local Storage (localStorage)</h2>
            <div class="welcome-banner">
                Hello, <span id="greeting-name">Guest</span>!
            </div>
            <div class="form-inline">
                <input type="text" id="name-input" placeholder="Enter your name...">
                <button id="save-btn">Save Name</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
